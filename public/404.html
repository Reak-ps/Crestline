<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Crestline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0c0f;
            --surface: #111318;
            --border: #1e2229;
            --accent: #ff4f6a;
            --accent-dim: rgba(255, 79, 106, 0.1);
            --text: #e8eaf0;
            --muted: #5a6070;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; overflow: hidden; }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(255,79,106,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,79,106,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,79,106,0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.15); } }

        .page { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

        header { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border); }

        .logo { font-family: var(--mono); font-size: 1.1rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
        .logo span { color: var(--accent); }

        .status-pill { display: flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; text-align: center; }

        .code-block {
            font-family: var(--mono);
            font-size: clamp(5rem, 18vw, 11rem);
            font-weight: 700; line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 60px rgba(255,79,106,0.4);
            letter-spacing: -0.04em;
            user-select: none;
            animation: flicker 6s ease-in-out infinite;
        }
        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.6; }
            97% { opacity: 1; }
            98% { opacity: 0.4; }
            99% { opacity: 1; }
        }

        h1 { font-family: var(--sans); font-size: 1.35rem; font-weight: 600; letter-spacing: 0.01em; }

        .subtitle { color: var(--muted); font-size: 0.95rem; line-height: 1.75; max-width: 360px; }

        .log-line {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 0.85rem 1.25rem;
            font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
            width: min(460px, 92vw); text-align: left;
        }
        .log-line .path { color: var(--text); }
        .log-line .err  { color: var(--accent); }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.6rem;
            font-family: var(--mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
            color: var(--muted); text-decoration: none;
            border: 1px solid var(--border); padding: 0.7rem 1.4rem; border-radius: 6px;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
        }
        .back-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
        .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        footer { padding: 1.25rem 2.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 0.68rem; color: var(--muted); }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="logo">Crestline<span>/error</span></div>
        <div class="status-pill"><span class="dot"></span>404</div>
    </header>

    <main class="center">
        <div class="code-block">404</div>

        <h1>Page Not Found</h1>

        <p class="subtitle">
            The requested resource does not exist on this server.<br>
            The URL may be misspelled or the file may have been moved.
        </p>

        <div class="log-line">
            <span class="err">[ERR]</span>
            GET <span class="path" id="reqPath">/unknown</span>
            <span class="err">404 Not Found</span>
        </div>

        <a class="back-btn" href="/">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Home
        </a>
    </main>

    <footer>
        <span>Crestline HTTP Server</span>
        <span>C++ · cross-platform</span>
    </footer>

</div>

<script>
    document.getElementById('reqPath').textContent = window.location.pathname || '/unknown';
</script>
</body>
</html>
